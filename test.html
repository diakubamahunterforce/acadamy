<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Course Player</title>

  <style>
    body {
      font-family: Arial;
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    .sidebar {
      width: 300px;
      border-right: 1px solid #ccc;
      padding-right: 10px;
    }

    .lesson {
      padding: 10px;
      margin: 5px 0;
      background: #f2f2f2;
      cursor: pointer;
      border-radius: 5px;
    }

    .lesson:hover {
      background: #ddd;
    }

    video {
      width: 800px;
      background: black;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <h3>Aulas</h3>
    <div id="lessons"></div>
  </div>

  <div>
    <h3>Player</h3>
    <video id="player" controls></video>
  </div>

<script>
const API = "http://127.0.0.1:5000/api";
const COURSE_ID = 1;
const token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJmcmVzaCI6ZmFsc2UsImlhdCI6MTc3NjA3OTgxMywianRpIjoiYjIzMjY4YmUtZDMyYS00OGVjLWFhN2UtNjE0MzcwMDFkNDNmIiwidHlwZSI6ImFjY2VzcyIsInN1YiI6IjEiLCJuYmYiOjE3NzYwNzk4MTMsImNzcmYiOiJkMjc5ZmQ0Ny1mNWUzLTQ0NDktYTAyNC05N2JjN2ExMDNmZmIiLCJleHAiOjE3NzYxNjYyMTMsInJvbGUiOiJzdHVkZW50In0.DkutqRkcX2Ci9CFpAdMDVvYNs4y4ZyfyeJqW2qdLa98";

// 
async function loadLessons() {
  const res = await fetch(`${API}/courses/${COURSE_ID}/lessons`, {
    headers: {
      "Authorization": `Bearer ${token}`
    }
  });

  const data = await res.json();

  const container = document.getElementById("lessons");
  container.innerHTML = "";

  data.lessons.forEach(lesson => {
    const div = document.createElement("div");
    div.className = "lesson";
    div.innerText = lesson.title;

    // 🎬 ao clicar chama endpoint stream
    div.onclick = () => playLesson(lesson.id);

    container.appendChild(div);
  });
}

// 🎥 tocar vídeo via endpoint Flask
function playLesson(lessonId) {
  const video = document.getElementById("player");

  const url = `${API}/lessons/${lessonId}/stream`;

  video.pause();
  video.src = url;
  video.load();

  video.onloadeddata = () => {
    video.play().catch(err => {
      console.log("Erro ao tocar vídeo:", err);
    });
  };
}

loadLessons();
</script>

</body>
</html>
